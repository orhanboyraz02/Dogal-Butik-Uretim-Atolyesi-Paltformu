<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Boutique Natural OS | Micro-Factory Brain</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { transition: background-color 0.3s, color 0.3s; }
        /* Custom scroll & card transitions */
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s ease; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        /* simple tab & modal helpers */
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; font-weight: 600; }
        .transition-all { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-white dark:bg-gray-800 shadow-xl z-10 flex flex-col transition-all duration-300 overflow-y-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
                <i class="fas fa-brain text-emerald-600 text-2xl"></i>
                <span class="font-bold text-xl tracking-tight">Boutique<span class="text-emerald-600">NaturalOS</span></span>
            </div>
            <nav class="flex-1 py-6 space-y-1 px-4">
                <a href="#" data-page="dashboard" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-emerald-50 dark:hover:bg-gray-700 transition group">
                    <i class="fas fa-tachometer-alt w-5"></i><span>Ana Gösterge Paneli</span>
                </a>
                <a href="#" data-page="products" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-emerald-50 dark:hover:bg-gray-700"><i class="fas fa-boxes w-5"></i><span>Ürün & Formülasyon</span></a>
                <a href="#" data-page="production" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl"><i class="fas fa-industry w-5"></i><span>Üretim & Batch</span></a>
                <a href="#" data-page="inventory" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl"><i class="fas fa-warehouse w-5"></i><span>Stok & Hammadde</span></a>
                <a href="#" data-page="sales" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl"><i class="fas fa-shopping-cart w-5"></i><span>Satış & WhatsApp</span></a>
                <a href="#" data-page="compliance" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl"><i class="fas fa-tags w-5"></i><span>Etiket & Regülasyon</span></a>
                <a href="#" data-page="aiassistant" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl"><i class="fas fa-robot w-5"></i><span>AI Asistan</span></a>
            </nav>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-sm">🌓 Tema</span>
                    <button id="themeToggle" class="bg-gray-200 dark:bg-gray-700 p-2 rounded-full w-9 h-9 flex items-center justify-center"><i class="fas fa-moon dark:fa-sun"></i></button>
                </div>
                <div class="text-xs text-gray-500 dark:text-gray-400 text-center">v2.0 · Üretim Beyni</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-6 md:p-8">
            <!-- Top bar (role & header) -->
            <div class="flex justify-between items-center mb-8">
                <h1 id="pageTitle" class="text-2xl font-bold">Kontrol Paneli</h1>
                <div class="flex items-center gap-3 bg-white dark:bg-gray-800 px-4 py-2 rounded-full shadow-sm">
                    <i class="fas fa-user-circle text-xl"></i>
                    <span class="text-sm font-medium">Admin / Üretim Yöneticisi</span>
                </div>
            </div>
            <!-- DYNAMIC PAGE RENDER -->
            <div id="pageContent"></div>
        </main>
    </div>

    <script>
        // ---------- MOCK DATA (Production ready localStorage simulation) ----------
        const STORAGE_KEYS = {
            PRODUCTS: 'naturalos_products',
            RAW_MATERIALS: 'naturalos_raw',
            BATCHES: 'naturalos_batches',
            ORDERS: 'naturalos_orders',
            FORMULATIONS: 'naturalos_formulas'
        };
        // dummy initial data
        function initMockData() {
            if(!localStorage.getItem(STORAGE_KEYS.PRODUCTS)) {
                const products = [
                    { id: 'p1', name: 'Adaçayı Tentürü', category: 'food', ingredients: 'Adaçayı, organik alkol', usage:'5-10 damla', warnings:'Hamileler kullanmasın', shelfLife:'24 ay', price: 129, cost: 45, stock: 120, type:'tincture' },
                    { id: 'p2', name: 'Argan Nemlendirici', category: 'cosmetics', ingredients: 'Argan yağı, shea', usage:'Yüze masaj', warnings:'Gözle temasından kaçının', shelfLife:'18 ay', price: 189, cost: 72, stock: 85 },
                    { id: 'p3', name: 'Doğal Pembe Kuvars Taşı', category: 'natural_stone', ingredients: 'Kuvars kristali', usage:'Meditasyon', warnings:'Kırılgandır', shelfLife:'sınırsız', price: 99, cost: 30, stock: 45 }
                ];
                localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products));
            }
            if(!localStorage.getItem(STORAGE_KEYS.RAW_MATERIALS)) {
                const raw = [
                    { id: 'rm1', name: 'Organik Adaçayı', unit:'kg', stock: 12.5, reorderLevel: 3, costPerUnit: 85, supplier: 'HerbalTürk' },
                    { id: 'rm2', name: 'Argan Yağı', unit:'L', stock: 8.2, reorderLevel: 2, costPerUnit: 240, supplier: 'MarakeşOils' },
                    { id: 'rm3', name: 'Kuvars Ham', unit:'kg', stock: 22, reorderLevel: 5, costPerUnit: 45, supplier: 'MadenTr' }
                ];
                localStorage.setItem(STORAGE_KEYS.RAW_MATERIALS, JSON.stringify(raw));
            }
            if(!localStorage.getItem(STORAGE_KEYS.BATCHES)) {
                const batches = [
                    { id: 'BATCH-2401', productId:'p1', date:'2025-02-10', expiry:'2027-02-10', quantity:50, rawUsage: [{rm:'rm1', qty:1.2}], status:'completed' },
                    { id: 'BATCH-2402', productId:'p2', date:'2025-02-15', expiry:'2026-08-15', quantity:30, rawUsage:[{rm:'rm2', qty:2.5}], status:'active' }
                ];
                localStorage.setItem(STORAGE_KEYS.BATCHES, JSON.stringify(batches));
            }
            if(!localStorage.getItem(STORAGE_KEYS.ORDERS)) {
                const orders = [{ id:'ORD1', productName:'Adaçayı Tentürü', qty:3, total:387, status:'completed', source:'whatsapp', date:'2025-03-01' }];
                localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders));
            }
            if(!localStorage.getItem(STORAGE_KEYS.FORMULATIONS)) {
                const formulas = [{ id:'form1', name:'Adaçayı Tentürü Formülü', productRef:'p1', ingredientsRatio:[{name:'Adaçayı', percent:20},{name:'Alkol', percent:80}], costPerLiter:120, baseYield:1000 }];
                localStorage.setItem(STORAGE_KEYS.FORMULATIONS, JSON.stringify(formulas));
            }
        }
        initMockData();

        // helpers
        function getProducts() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]'); }
        function getRawMaterials() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.RAW_MATERIALS) || '[]'); }
        function getBatches() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.BATCHES) || '[]'); }
        function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '[]'); }
        function getFormulations() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.FORMULATIONS) || '[]'); }
        function saveProducts(data){localStorage.setItem(STORAGE_KEYS.PRODUCTS,JSON.stringify(data));}
        
        // Dashboard analytics
        function renderDashboard() {
            const products = getProducts();
            const batches = getBatches();
            const orders = getOrders();
            const totalRevenue = orders.reduce((sum,o)=>sum+o.total,0);
            const totalProducts = products.length;
            const activeBatches = batches.filter(b=>b.status==='active').length;
            const lowStockRaw = getRawMaterials().filter(r=>r.stock < r.reorderLevel).length;
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow card-hover"><i class="fas fa-cubes text-emerald-500 text-2xl mb-2"></i><p class="text-gray-500">Toplam Ürün</p><p class="text-3xl font-bold">${totalProducts}</p></div>
                    <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><i class="fas fa-chart-line text-blue-500 text-2xl mb-2"></i><p class="text-gray-500">Hasılat (₺)</p><p class="text-3xl font-bold">₺${totalRevenue}</p></div>
                    <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><i class="fas fa-microchip text-purple-500 text-2xl mb-2"></i><p class="text-gray-500">Aktif Batch</p><p class="text-3xl font-bold">${activeBatches}</p></div>
                    <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><i class="fas fa-exclamation-triangle text-amber-500 text-2xl mb-2"></i><p class="text-gray-500">Düşük Stok</p><p class="text-3xl font-bold">${lowStockRaw}</p></div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow mb-6"><h2 class="font-semibold text-xl mb-3">📊 Satış Trendi & Verimlilik</h2><canvas id="salesChart" height="100"></canvas><p class="text-sm mt-3 text-gray-500">En çok satan: ${products[0]?.name || '-'} (${products[0]?.price || 0}₺)</p></div>
                <div class="grid md:grid-cols-2 gap-6"><div class="bg-white dark:bg-gray-800 p-5 rounded-2xl"><h3 class="font-semibold">📦 Üretim Darboğazları</h3><ul class="mt-2 space-y-1">${batches.slice(0,3).map(b=>`<li>✔️ Lot ${b.id} - ${b.status}</li>`).join('') || '<li>Henüz batch yok</li>'}</ul></div>
                <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl"><h3 class="font-semibold">💰 Brüt Kar Marjı Tahmini</h3><p class="text-2xl mt-2">${Math.round(((products.reduce((a,p)=>a+(p.price-p.cost),0)/products.reduce((a,p)=>a+p.price,1))*100)) || 42}% Ortalama</p></div></div>
            `;
        }

        // Product & Formulation tab (multi-category)
        function renderProducts() {
            const products = getProducts();
            return `
                <div class="mb-5 flex justify-between"><h2 class="text-xl font-bold">Ürünler & Formülasyon</h2><button onclick="window.showAddProductModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm"><i class="fas fa-plus"></i> Yeni Ürün</button></div>
                <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-2xl shadow"><table class="min-w-full"><thead class="bg-gray-100 dark:bg-gray-700"><tr><th class="p-3">Ürün</th><th>Kategori</th><th>İçerik</th><th>Uyarılar</th><th>Fiyat(₺)</th><th>Maliyet</th><th>Aksiyon</th></tr></thead><tbody>
                    ${products.map(p => `<tr class="border-b"><td class="p-3">${p.name}</td><td>${p.category}</td><td class="max-w-xs truncate">${p.ingredients || '-'}</td><td>${p.warnings || '-'}</td><td>${p.price}</td><td>${p.cost}</td><td><button onclick="alert('Formül detay: ${p.ingredients}')" class="text-emerald-600"><i class="fas fa-flask"></i></button></td></tr>`).join('')}
                </tbody></table></div>
                <div class="mt-8 bg-white dark:bg-gray-800 rounded-2xl p-5"><h3 class="font-bold flex gap-2"><i class="fas fa-recipe"></i> Reçete Motoru (Batch Scaler)</h3><p>Formül bazlı maliyet: ${getFormulations()[0]?.costPerLiter || 0} ₺/Litre. Ölçeklendirme hazır.</p><button onclick="alert('Örnek: 100ml -> 5L dönüşümü yapılabilir, formül oranları korunur.')" class="mt-2 text-sm bg-gray-200 dark:bg-gray-700 p-2 rounded">Ölçeklendirme Simülasyonu</button></div>`;
        }

        function renderProduction() {
            const batches = getBatches();
            const products = getProducts();
            return `<div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow"><h2 class="text-xl font-bold mb-4">Batch & Lot Üretim Takibi</h2><button onclick="window.createBatch()" class="mb-4 bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm">+ Yeni Batch Oluştur</button>
            <table class="w-full"><thead><tr><th>Lot No</th><th>Ürün</th><th>Üretim Tarihi</th><th>SKT</th><th>Miktar</th><th>Durum</th></tr></thead><tbody>
            ${batches.map(b=>{ const prod = products.find(p=>p.id===b.productId); return `<tr><td class="p-2">${b.id}</td><td>${prod?.name || 'Ürün'}</td><td>${b.date}</td><td>${b.expiry}</td><td>${b.quantity} adet</td><td><span class="px-2 py-1 rounded-full text-xs ${b.status==='completed'?'bg-green-100 text-green-800':'bg-amber-100'}">${b.status}</span></td></tr>`}).join('')}
            </tbody></table></div>`;
        }

        function renderInventory() {
            const raw = getRawMaterials();
            return `<div class="bg-white dark:bg-gray-800 rounded-2xl p-6"><h2 class="text-xl font-bold mb-3">📦 Hammadde Envanteri & Tedarikçi</h2><table class="w-full"><thead><tr><th>Malzeme</th><th>Stok</th><th>Birim</th><th>Kritik Seviye</th><th>Maliyet/Birim</th><th>Tedarikçi</th></tr></thead><tbody>
            ${raw.map(r=>`<tr><td class="p-2">${r.name}</td><td class="${r.stock<r.reorderLevel?'text-red-500 font-bold':''}">${r.stock}</td><td>${r.unit}</td><td>${r.reorderLevel}</td><td>₺${r.costPerUnit}</td><td>${r.supplier}</td></tr>`).join('')}
            </tbody></table><div class="mt-4 text-sm text-amber-600">⚠️ Düşük stok uyarıları aktif: ${raw.filter(r=>r.stock<r.reorderLevel).map(r=>r.name).join(', ')||'Yok'}</div></div>`;
        }

        function renderSales() {
            const orders = getOrders();
            return `<div class="bg-white dark:bg-gray-800 rounded-2xl p-6"><div class="flex justify-between"><h2 class="text-xl font-bold">Satışlar & WhatsApp Entegrasyon</h2><a href="#" onclick="window.triggerWhatsAppOrder()" class="bg-green-500 px-4 py-2 rounded-xl text-white text-sm"><i class="fab fa-whatsapp"></i> WhatsApp ile Sipariş</a></div>
            <div class="mt-4 grid md:grid-cols-2 gap-4"><div><h3>🛒 E-ticaret Ürün Listesi</h3><ul>${getProducts().map(p=>`<li class="border-b py-2 flex justify-between"><span>${p.name} - ₺${p.price}</span><button onclick="window.addToOrder('${p.name}',${p.price})" class="text-emerald-600">Sipariş Ekle</button></li>`).join('')}</ul></div>
            <div><h3>📋 Sipariş Paneli</h3><ul>${orders.map(o=>`<li>${o.productName} x${o.qty} = ₺${o.total} (${o.status})</li>`).join('')}</ul></div></div></div>`;
        }

        function renderCompliance() {
            const products = getProducts();
            return `<div class="bg-white dark:bg-gray-800 rounded-2xl p-6"><h2 class="text-xl font-bold mb-3">🏷️ Etiket & Regülasyon Uyum Merkezi</h2><p>Gıda & Kozmetik regülasyonlarına uygun etiket içeriği oluştur.</p>
            ${products.map(p=>`<div class="border p-4 my-3 rounded-xl"><h3 class="font-semibold">${p.name}</h3><div class="text-sm"><strong>İçindekiler:</strong> ${p.ingredients}<br><strong>Kullanım:</strong> ${p.usage||'belirtilmemiş'}<br><strong>Uyarılar:</strong> ${p.warnings}<br><strong>Raf Ömrü:</strong> ${p.shelfLife}</div><button onclick="window.generateLabel('${p.name}')" class="mt-2 bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded text-xs">Etiketi Dışa Aktar (PDF Simülasyonu)</button></div>`).join('')}
            <div class="text-xs text-gray-400 mt-4">* Yasaklı madde kontrolü: sistemde yasaklı içerik bulunmamaktadır (demo).</div></div>`;
        }

        function renderAIAssistant() {
            return `<div class="bg-white dark:bg-gray-800 rounded-2xl p-6"><div class="flex gap-3 items-center"><i class="fas fa-robot text-3xl text-emerald-500"></i><h2 class="text-2xl font-bold">AI Formül Asistanı</h2></div>
            <div class="mt-6"><label class="block">Ürün tipi / özellikler girin (örn: nemlendirici, doğal yağ)</label><input type="text" id="aiPromptInput" class="w-full p-3 border rounded-xl mt-2 dark:bg-gray-700" placeholder="Örn: Kuru ciltler için bitkisel krem formülü öner...">
            <button onclick="window.runAISuggestion()" class="mt-3 bg-emerald-600 text-white px-4 py-2 rounded-xl">Öneri Üret</button><div id="aiResult" class="mt-4 p-4 bg-gray-100 dark:bg-gray-800/50 rounded-xl italic">Yapay zeka, ürün fikirleri, fiyat optimizasyonu ve formülasyon tüyosu verecek.</div></div>
            <div class="mt-6 border-t pt-4"><h3>📈 Fiyat Optimizasyonu</h3><p>Önerilen kar marjı: ~%45, mevcut ortalama kar: %${Math.round(((getProducts().reduce((a,p)=>a+(p.price-p.cost),0)/getProducts().reduce((a,p)=>a+p.price,1))*100))} — optimizasyon yapılabilir.</p></div></div>`;
        }

        // Helper functions for UI actions
        window.showAddProductModal = function() {
            const newName = prompt("Ürün adı:");
            if(newName) {
                const products = getProducts();
                const newId = 'p'+Date.now();
                products.push({ id:newId, name:newName, category:'food', ingredients:'Yeni reçete', warnings:'Test', shelfLife:'12 ay', price:99, cost:40, stock:10 });
                saveProducts(products);
                loadPage('products');
            }
        };
        window.createBatch = function() {
            const products = getProducts();
            if(products.length===0) return alert("Ürün yok");
            const prodId = products[0].id;
            const batches = getBatches();
            const newId = `BATCH-${Math.floor(Math.random()*9000)+1000}`;
            batches.push({ id:newId, productId:prodId, date:new Date().toISOString().slice(0,10), expiry:'2026-12-31', quantity:25, rawUsage:[], status:'active' });
            localStorage.setItem(STORAGE_KEYS.BATCHES, JSON.stringify(batches));
            loadPage('production');
        };
        window.triggerWhatsAppOrder = function() {
            const text = "Merhaba, doğal ürünlerinizden sipariş vermek istiyorum.";
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };
        let tempOrder = [];
        window.addToOrder = function(productName,price){
            const orders = getOrders();
            const newOrder = { id:'ORD'+Date.now(), productName, qty:1, total:price, status:'pending', source:'ecommerce', date:new Date().toISOString().slice(0,10) };
            orders.push(newOrder);
            localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders));
            alert(`${productName} sepete eklendi (demo sipariş kaydedildi).`);
            loadPage('sales');
        };
        window.generateLabel = function(productName){
            const prod = getProducts().find(p=>p.name===productName);
            if(prod){
                const labelContent = `Ürün: ${prod.name}\nİçerik: ${prod.ingredients}\nKullanım: ${prod.usage||'Önerilen kullanım'}\nUyarılar: ${prod.warnings}\nSon Kullanma: ${prod.shelfLife}\n\nÜretici: Boutique Natural OS - Regülasyon uyumlu etiket.`;
                alert("Etiket içeriği (kopyalayabilirsiniz):\n\n"+labelContent);
            } else alert("etiket oluşturulamadı");
        };
        window.runAISuggestion = function(){
            const promptText = document.getElementById('aiPromptInput')?.value;
            const resultDiv = document.getElementById('aiResult');
            if(resultDiv){
                resultDiv.innerHTML = `🧠 AI Önerisi: "${promptText || 'doğal formül'}" için ideal oranlar: %40 baz yağ, %30 aktif öz, %20 emülgatör, %10 koruyucu (doğal). Fiyat optimizasyonu: premium segmentte ₺250-₺350 arası fiyatlandırma. Etiket uyarısı: "Doğal kökenli, cilt testi yapılmıştır."`;
            } else alert("öneri hazır: bitkisel ürün için antifungal bileşenler ekleyin.");
        };
        
        const pageRenderers = {
            dashboard: renderDashboard,
            products: renderProducts,
            production: renderProduction,
            inventory: renderInventory,
            sales: renderSales,
            compliance: renderCompliance,
            aiassistant: renderAIAssistant
        };
        function loadPage(pageId){
            const renderFn = pageRenderers[pageId];
            if(renderFn){
                document.getElementById('pageContent').innerHTML = renderFn();
                document.getElementById('pageTitle').innerText = document.querySelector(`a[data-page="${pageId}"] span`)?.innerText || "Dashboard";
                if(pageId === 'dashboard' && typeof Chart !== 'undefined'){
                    const ctx = document.getElementById('salesChart')?.getContext('2d');
                    if(ctx && window.myChart) window.myChart.destroy();
                    if(ctx) window.myChart = new Chart(ctx, { type:'bar', data:{ labels:['Mart','Nisan','Mayıs'], datasets:[{ label:'Satış (₺)', data:[1250,1890,2430], backgroundColor:'#10b981'}]}});
                } else if(pageId === 'dashboard'){
                    setTimeout(()=>{ if(document.getElementById('salesChart')) loadChartFallback(); },50);
                }
            }
        }
        function loadChartFallback(){
            const ctx=document.getElementById('salesChart')?.getContext('2d');
            if(ctx&&window.myChart)window.myChart.destroy();
            if(ctx&&typeof Chart!=='undefined') window.myChart=new Chart(ctx,{type:'bar',data:{labels:['Mart','Nisan','Mayıs'],datasets:[{label:'Gelir',data:[980,1540,2190],backgroundColor:'#10b981'}]}});
        }
        // dark/light toggle and nav active
        const themeToggle = document.getElementById('themeToggle');
        themeToggle?.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        document.querySelectorAll('.nav-link').forEach(link=>{
            link.addEventListener('click',(e)=>{
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if(page) loadPage(page);
                document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('bg-emerald-50','dark:bg-gray-700','text-emerald-600'));
